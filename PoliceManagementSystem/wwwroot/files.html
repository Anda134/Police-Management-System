<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- REQ-49, REQ-50, REQ-51, REQ-52, REQ-53, REQ-54, REQ-55, REQ-56, REQ-57, REQ-58, REQ-59 -->
    <title>Criminal Files - Police Inspectorate</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>

    <!-- REQ-73, REQ-75: Navbar with user info and logout -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="index.html">🚔 Police Inspectorate</a>
            <div class="navbar-nav me-auto">
                <a class="nav-link" href="stations.html">Stations</a>
                <a class="nav-link" href="agents.html">Agents</a>
                <a class="nav-link active" href="files.html">Criminal Files</a>
                <a class="nav-link" href="conferences.html">Conferences</a>
                <a class="nav-link" href="transfers.html">Transfers</a>
            </div>
            <div class="navbar-nav ms-auto">
                <span class="navbar-text text-light me-3">
                    👤 <span id="navUsername"></span>
                    <span id="navRole" class="badge bg-secondary ms-1"></span>
                </span>
                <button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <h1 class="page-title">Criminal Files</h1>

        <!-- Alert box for success/error messages -->
        <div id="alertBox"></div>

        <!-- REQ-49: Create new criminal file form -->
        <div class="card p-4 mb-4 form-section">
            <h4>Add New Criminal File</h4>
            <div class="row g-3">

                <div class="col-md-3">
                    <label class="form-label fw-semibold">Title *</label>
                    <input type="text" class="form-control" id="fileTitle" placeholder="File title">
                </div>

                <!-- REQ-50: Files grouped by category -->
                <div class="col-md-2">
                    <label class="form-label fw-semibold">Category *</label>
                    <select class="form-select" id="fileCategory">
                        <option value="">Select category...</option>
                        <option value="Theft">Theft</option>
                        <option value="Fraud">Fraud</option>
                        <option value="Violence">Violence</option>
                        <option value="Drugs">Drugs</option>
                        <option value="Cybercrime">Cybercrime</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="col-md-3">
                    <label class="form-label fw-semibold">Station *</label>
                    <select class="form-select" id="fileStation">
                        <option value="">Select station...</option>
                    </select>
                </div>

                <div class="col-md-3">
                    <label class="form-label fw-semibold">Assigned Agent</label>
                    <select class="form-select" id="fileAgent">
                        <option value="">Select agent...</option>
                    </select>
                </div>

            </div>

            <div class="mt-3">
                <button class="btn btn-success" onclick="createFile()">➕ Add File</button>
                <button class="btn btn-secondary ms-2" onclick="clearForm()">Clear</button>
            </div>
        </div>

        <!-- REQ-57, REQ-58, REQ-59: Search and filter -->
        <div class="card p-3 mb-4">
            <div class="row g-3 align-items-end">
                <div class="col-md-5">
                    <label class="form-label fw-semibold">
                        <!-- REQ-57, REQ-58: Search by name or agent -->
                        Search by title or agent name
                    </label>
                    <input type="text" class="form-control" id="searchInput" placeholder="Type to search...">
                </div>

                <!-- REQ-59: Filter by category -->
                <div class="col-md-3">
                    <label class="form-label fw-semibold">Filter by Category</label>
                    <select class="form-select" id="categoryFilter">
                        <option value="">All categories</option>
                        <option value="Theft">Theft</option>
                        <option value="Fraud">Fraud</option>
                        <option value="Violence">Violence</option>
                        <option value="Drugs">Drugs</option>
                        <option value="Cybercrime">Cybercrime</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="col-md-2">
                    <button class="btn btn-primary w-100" onclick="searchFiles()">🔍 Search</button>
                </div>

                <div class="col-md-2">
                    <button class="btn btn-secondary w-100" onclick="loadFiles()">Reset</button>
                </div>
            </div>
        </div>

        <!-- REQ-51, REQ-54: View files with status -->
        <div class="card p-4">
            <h4>Files List</h4>
            <div class="table-responsive">
                <table class="table table-bordered table-striped table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Title</th>
                            <!-- REQ-50: Category -->
                            <th>Category</th>
                            <!-- REQ-54: Status -->
                            <th>Status</th>
                            <th>Station</th>
                            <th>Agent</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="filesTableBody"></tbody>
                </table>
            </div>
        </div>

    </div>

    <!-- REQ-56: Version history modal -->
    <div class="modal fade" id="historyModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-dark text-white">
                    <h5 class="modal-title">📋 File Version History (REQ-56)</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <table class="table table-bordered table-striped">
                        <thead class="table-secondary">
                            <tr>
                                <th>Date</th>
                                <th>Change Type</th>
                                <th>Status</th>
                                <th>Category</th>
                                <th>Changed By</th>
                            </tr>
                        </thead>
                        <tbody id="historyTableBody"></tbody>
                    </table>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="javascript/config.js"></script>
    <script src="javascript/files.js"></script>

</body>
</html>
