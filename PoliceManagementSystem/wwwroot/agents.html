<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- REQ-17, REQ-18, REQ-19, REQ-21, REQ-23, REQ-24 -->
    <title>Agents - Police Inspectorate</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>

    <!-- REQ-73, REQ-75: Navbar with user info and logout -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="index.html">🚔 Police Inspectorate</a>
            <div class="navbar-nav me-auto">
                <a class="nav-link" href="stations.html">Stations</a>
                <a class="nav-link active" href="agents.html">Agents</a>
                <a class="nav-link" href="files.html">Criminal Files</a>
                <a class="nav-link" href="conferences.html">Conferences</a>
                <a class="nav-link" href="transfers.html">Transfers</a>
            </div>
            <div class="navbar-nav ms-auto">
                <span class="navbar-text text-light me-3">
                    👤 <span id="navUsername"></span>
                    <span id="navRole" class="badge bg-secondary ms-1"></span>
                </span>
                <button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <h1 class="page-title">Agents</h1>

        <!-- Alert box for success/error messages -->
        <div id="alertBox"></div>

        <!-- REQ-17, REQ-19: Create new agent form -->
        <!-- Visible only to Admin and ChiefInspector (REQ-75) -->
        <div class="card p-4 mb-4 form-section" id="createFormCard">
            <h4>Add New Agent</h4>
            <div class="row g-3">

                <div class="col-md-3">
                    <label class="form-label fw-semibold">First Name *</label>
                    <input type="text" class="form-control" id="agentFirstName" placeholder="First name">
                </div>

                <div class="col-md-3">
                    <label class="form-label fw-semibold">Last Name</label>
                    <input type="text" class="form-control" id="agentLastName" placeholder="Last name">
                </div>

                <div class="col-md-2">
                    <label class="form-label fw-semibold">Badge *</label>
                    <input type="text" class="form-control" id="agentBadge" placeholder="Badge number">
                </div>

                <!-- REQ-19: Role selection -->
                <div class="col-md-2">
                    <label class="form-label fw-semibold">Role *</label>
                    <select class="form-select" id="agentRole">
                        <option value="Agent">Agent</option>
                        <!-- REQ-24: Only one StationHead per station - validated server-side -->
                        <option value="StationHead">Station Head</option>
                        <option value="ChiefInspector">Chief Inspector</option>
                    </select>
                </div>

                <!-- REQ-17: Assign agent to station -->
                <div class="col-md-2">
                    <label class="form-label fw-semibold">Station *</label>
                    <select class="form-select" id="agentStation">
                        <option value="">Select station...</option>
                    </select>
                </div>

            </div>

            <div class="mt-3">
                <button class="btn btn-success" onclick="createAgent()">➕ Add Agent</button>
                <button class="btn btn-secondary ms-2" onclick="clearForm()">Clear</button>
            </div>
        </div>

        <!-- REQ-17: Agents list table -->
        <div class="card p-4">
            <h4>Agents List</h4>
            <div class="table-responsive">
                <table class="table table-bordered table-striped table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>First Name</th>
                            <th>Last Name</th>
                            <th>Badge</th>
                            <th>Role</th>
                            <th>Station</th>
                            <!-- REQ-21: Shows hierarchy -->
                            <th>Superior</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="agentsTableBody"></tbody>
                </table>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="javascript/config.js"></script>
    <script src="javascript/agents.js"></script>

</body>
</html>
