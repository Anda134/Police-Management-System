<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personnel - Police Inspectorate</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app-shell">

        <aside class="sidebar">
            <a href="index.html" class="sidebar-brand">
                <div class="sidebar-brand-icon">🛡️</div>
                Police Inspectorate
            </a>
            <div class="sidebar-user">
                <div class="sidebar-user-name" id="navUsername">-</div>
                <div class="sidebar-user-role" id="navRole">-</div>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html" class="sidebar-link">
                    <span class="nav-icon">🏠</span> Dashboard
                </a>
                <a href="stations.html" class="sidebar-link">
                    <span class="nav-icon">🏢</span> Stations
                </a>
                <a href="agents.html" class="sidebar-link active">
                    <span class="nav-icon">👮</span> Personnel
                </a>
                <a href="files.html" class="sidebar-link">
                    <span class="nav-icon">📁</span> Case Files
                </a>
                <a href="conferences.html" class="sidebar-link">
                    <span class="nav-icon">📞</span> Communications
                </a>
                <a href="transfers.html" class="sidebar-link">
                    <span class="nav-icon">🔄</span> Transfers
                </a>
            </nav>
            <div class="sidebar-footer">
                <button class="btn-logout" onclick="logout()">⬅ Logout</button>
            </div>
        </aside>

        <div class="main-content">
            <div class="page-header">
                <h1>👮 Personnel</h1>
                <p>Manage police agents and their assignments</p>
            </div>

            <div id="alertBox"></div>

            <!-- Add Agent Form -->
            <div class="card mb-4" id="createFormCard" style="display:none;">
                <div class="card-header-row">
                    <span class="card-title">➕ Add New Agent</span>
                </div>
                <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:16px;">
                    <div class="form-group">
                        <label class="form-label">First Name *</label>
                        <input type="text" class="form-control" id="agentFirstName" placeholder="First name">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Last Name</label>
                        <input type="text" class="form-control" id="agentLastName" placeholder="Last name">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Badge *</label>
                        <input type="text" class="form-control" id="agentBadge" placeholder="Badge number">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Role *</label>
                        <select class="form-select" id="agentRole">
                            <option value="Agent">Agent</option>
                            <option value="StationHead">Station Head</option>
                            <option value="ChiefInspector">Chief Inspector</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Station *</label>
                        <select class="form-select" id="agentStation">
                            <option value="">Select station...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Room Assignment</label>
                        <select class="form-select" id="agentRoom">
                            <option value="Investigation Wing">Investigation Wing</option>
                            <option value="Patrol Office">Patrol Office</option>
                            <option value="Records">Records</option>
                            <option value="Command">Command</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Superior</label>
                        <select class="form-select" id="agentSuperior">
                            <option value="">None</option>
                        </select>
                    </div>
                </div>
                <div style="margin-top:16px;display:flex;gap:10px;">
                    <button class="btn btn-primary" onclick="createAgent()">➕ Add Agent</button>
                    <button class="btn btn-secondary" onclick="clearForm()">Clear</button>
                </div>
            </div>

            <!-- Agents Table -->
            <div class="card">
                <div class="card-header-row">
                    <span class="card-title">👮 Agents List</span>
                    <button class="btn btn-primary btn-sm" id="addAgentBtn" style="display:none;" onclick="toggleForm()">
                        ➕ Add Agent
                    </button>
                </div>
                <table class="table">
                    <thead>
                        <tr>
                            <th>Agent</th>
                            <th>Badge</th>
                            <th>Role</th>
                            <th>Station</th>
                            <th>Room</th>
                            <th>Superior</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="agentsTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Edit Agent Modal -->
    <div class="modal-overlay" id="editModal">
        <div class="modal-card" style="width:520px;">
            <div class="modal-title">✏️ Edit Agent</div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
                <div class="form-group">
                    <label class="form-label">First Name *</label>
                    <input type="text" class="form-control" id="editFirstName">
                </div>
                <div class="form-group">
                    <label class="form-label">Last Name</label>
                    <input type="text" class="form-control" id="editLastName">
                </div>
                <div class="form-group">
                    <label class="form-label">Badge *</label>
                    <input type="text" class="form-control" id="editBadge">
                </div>
                <div class="form-group">
                    <label class="form-label">Role *</label>
                    <select class="form-select" id="editRole">
                        <option value="Agent">Agent</option>
                        <option value="StationHead">Station Head</option>
                        <option value="ChiefInspector">Chief Inspector</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Station *</label>
                    <select class="form-select" id="editStation"></select>
                </div>
                <div class="form-group">
                    <label class="form-label">Room Assignment</label>
                    <select class="form-select" id="editRoom">
                        <option value="Investigation Wing">Investigation Wing</option>
                        <option value="Patrol Office">Patrol Office</option>
                        <option value="Records">Records</option>
                        <option value="Command">Command</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Superior</label>
                    <select class="form-select" id="editSuperior"></select>
                </div>
            </div>

            <div id="editError" class="alert alert-danger" style="display:none;margin-top:12px;"></div>

            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeEditModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveEdit()">💾 Save</button>
            </div>
        </div>
    </div>

    <script src="javascript/config.js"></script>
    <script>
        requireAuth();

        document.getElementById("navUsername").textContent = localStorage.getItem("username") || "-";
        document.getElementById("navRole").textContent = localStorage.getItem("role") || "-";

        if (hasRole(["Admin", "ChiefInspector"])) {
            document.getElementById("addAgentBtn").style.display = "flex";
        }

        let allAgents = [];
        let allStations = [];
        let editingId = null;

        /**
         * Toggle add form visibility.
         */
        function toggleForm() {
            const form = document.getElementById("createFormCard");
            form.style.display = form.style.display === "none" ? "block" : "none";
        }

        /**
         * REQ-17: Load all agents and stations.
         */
        async function loadData() {
            try {
                const [agentsRes, stationsRes] = await Promise.all([
                    apiFetch(`${API_BASE_URL}/Agent`),
                    apiFetch(`${API_BASE_URL}/PoliceStation`)
                ]);

                if (agentsRes) allAgents = await agentsRes.json();
                if (stationsRes) allStations = await stationsRes.json();

                populateStationDropdowns();
                populateSuperiorDropdown("agentSuperior", null);
                renderTable();
            } catch (err) {
                showAlert("Failed to load data.", "danger");
            }
        }

        /**
         * Populate station dropdowns.
         */
        function populateStationDropdowns() {
            const selects = ["agentStation", "editStation"];
            selects.forEach(id => {
                const sel = document.getElementById(id);
                if (!sel) return;
                sel.innerHTML = `<option value="">Select station...</option>`;
                allStations.forEach(s => {
                    sel.innerHTML += `<option value="${s.id}">${s.name}</option>`;
                });
            });
        }

        /**
         * REQ-21: Populate superior dropdown excluding current agent.
         * @param {string} selectId - The select element ID.
         * @param {number|null} excludeId - Agent ID to exclude.
         */
        function populateSuperiorDropdown(selectId, excludeId) {
            const sel = document.getElementById(selectId);
            if (!sel) return;
            sel.innerHTML = `<option value="">None</option>`;
            allAgents
                .filter(a => a.id !== excludeId)
                .forEach(a => {
                    sel.innerHTML += `<option value="${a.id}">${a.firstName} ${a.lastName} (${a.role})</option>`;
                });
        }

        /**
         * REQ-17, REQ-19, REQ-21: Render agents table.
         */
        function renderTable() {
            const tbody = document.getElementById("agentsTableBody");
            tbody.innerHTML = "";

            if (allAgents.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="empty-state">No agents found.</td></tr>`;
                return;
            }

            allAgents.forEach(agent => {
                const canEdit = hasRole(["Admin", "ChiefInspector"]);
                tbody.innerHTML += `
                    <tr>
                        <td>
                            <div style="display:flex;align-items:center;gap:10px;">
                                <div class="agent-avatar" style="width:32px;height:32px;font-size:11px;">
                                    ${agent.profileImageUrl
                        ? `<img src="${agent.profileImageUrl}" alt="${agent.firstName}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`
                        : `${agent.firstName[0]}${agent.lastName?.[0] || ""}`
                    }
                                </div>
                                <div>
                                    <div style="font-weight:600;font-size:13px;">${agent.firstName} ${agent.lastName}</div>
                                </div>
                            </div>
                        </td>
                        <td>${agent.badge}</td>
                        <td><span class="badge ${roleBadgeClass(agent.role)}">${agent.role}</span></td>
                        <td>${agent.policeStationName}</td>
                        <td>${agent.roomAssignment || "-"}</td>
                        <td>${agent.superiorName || "-"}</td>
                        <td>
                            ${canEdit ? `
                                <button class="btn btn-secondary btn-sm" onclick="openEditModal(${agent.id})">✏️</button>
                                <button class="btn btn-danger btn-sm" onclick="deleteAgent(${agent.id})">🗑️</button>
                            ` : "-"}
                        </td>
                    </tr>
                `;
            });
        }

        function roleBadgeClass(role) {
            if (role === "ChiefInspector") return "badge-info";
            if (role === "StationHead") return "badge-warning";
            if (role === "Admin") return "badge-danger";
            return "badge-secondary";
        }

        /**
         * REQ-17: Create new agent.
         */
        async function createAgent() {
            const firstName = document.getElementById("agentFirstName").value.trim();
            const lastName = document.getElementById("agentLastName").value.trim();
            const badge = document.getElementById("agentBadge").value.trim();
            const role = document.getElementById("agentRole").value;
            const stationId = parseInt(document.getElementById("agentStation").value);
            const room = document.getElementById("agentRoom").value;
            const superiorId = document.getElementById("agentSuperior").value
                ? parseInt(document.getElementById("agentSuperior").value)
                : null;

            if (!firstName || !badge || isNaN(stationId)) {
                showAlert("First name, badge and station are required.", "danger");
                return;
            }

            try {
                const res = await apiFetch(`${API_BASE_URL}/Agent`, {
                    method: "POST",
                    body: JSON.stringify({
                        firstName, lastName, badge, role,
                        policeStationId: stationId,
                        roomAssignment: room,
                        superiorId
                    })
                });

                if (res && res.ok) {
                    clearForm();
                    await loadData();
                    showAlert("Agent created successfully.", "success");
                } else {
                    const err = await res.text();
                    showAlert(err || "Failed to create agent.", "danger");
                }
            } catch (err) {
                showAlert("Connection error.", "danger");
            }
        }

        /**
         * REQ-19: Open edit modal for agent.
         * @param {number} id - Agent ID to edit.
         */
        function openEditModal(id) {
            const agent = allAgents.find(a => a.id === id);
            if (!agent) return;

            editingId = id;
            document.getElementById("editFirstName").value = agent.firstName;
            document.getElementById("editLastName").value = agent.lastName;
            document.getElementById("editBadge").value = agent.badge;
            document.getElementById("editRole").value = agent.role;
            document.getElementById("editRoom").value = agent.roomAssignment || "Investigation Wing";
            document.getElementById("editError").style.display = "none";

            populateStationDropdowns();
            document.getElementById("editStation").value = agent.policeStationId;

            populateSuperiorDropdown("editSuperior", id);
            document.getElementById("editSuperior").value = agent.superiorId || "";

            document.getElementById("editModal").classList.add("open");
        }

        function closeEditModal() {
            document.getElementById("editModal").classList.remove("open");
        }

        /**
         * REQ-19, REQ-21: Save edited agent.
         */
        async function saveEdit() {
            const firstName = document.getElementById("editFirstName").value.trim();
            const lastName = document.getElementById("editLastName").value.trim();
            const badge = document.getElementById("editBadge").value.trim();
            const role = document.getElementById("editRole").value;
            const stationId = parseInt(document.getElementById("editStation").value);
            const room = document.getElementById("editRoom").value;
            const superiorId = document.getElementById("editSuperior").value
                ? parseInt(document.getElementById("editSuperior").value)
                : null;

            if (!firstName || !badge || isNaN(stationId)) {
                document.getElementById("editError").textContent = "First name, badge and station are required.";
                document.getElementById("editError").style.display = "block";
                return;
            }

            try {
                const res = await apiFetch(`${API_BASE_URL}/Agent/${editingId}`, {
                    method: "PUT",
                    body: JSON.stringify({
                        firstName, lastName, badge, role,
                        policeStationId: stationId,
                        roomAssignment: room,
                        superiorId
                    })
                });

                if (res && res.ok) {
                    closeEditModal();
                    await loadData();
                    showAlert("Agent updated successfully.", "success");
                } else {
                    const err = await res.text();
                    document.getElementById("editError").textContent = err || "Failed to update agent.";
                    document.getElementById("editError").style.display = "block";
                }
            } catch (err) {
                document.getElementById("editError").textContent = "Connection error.";
                document.getElementById("editError").style.display = "block";
            }
        }

        /**
         * REQ-18: Delete agent.
         * @param {number} id - Agent ID to delete.
         */
        async function deleteAgent(id) {
            if (!confirm("Are you sure you want to delete this agent?")) return;

            try {
                const res = await apiFetch(`${API_BASE_URL}/Agent/${id}`, { method: "DELETE" });
                if (res && res.ok) {
                    await loadData();
                    showAlert("Agent deleted.", "success");
                } else {
                    showAlert("Failed to delete agent.", "danger");
                }
            } catch (err) {
                showAlert("Connection error.", "danger");
            }
        }

        function clearForm() {
            document.getElementById("agentFirstName").value = "";
            document.getElementById("agentLastName").value = "";
            document.getElementById("agentBadge").value = "";
            document.getElementById("agentRole").value = "Agent";
            document.getElementById("agentStation").value = "";
            document.getElementById("agentRoom").value = "Investigation Wing";
            document.getElementById("agentSuperior").value = "";
        }

        function showAlert(msg, type) {
            const box = document.getElementById("alertBox");
            box.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
            setTimeout(() => box.innerHTML = "", 4000);
        }

        function logout() {
            localStorage.clear();
            window.location.href = "login.html";
        }

        document.getElementById("editModal").addEventListener("click", e => {
            if (e.target.id === "editModal") closeEditModal();
        });

        window.onload = loadData;
    </script>

</body>
</html>
