<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stations - Police Inspectorate</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>

    <div class="app-shell">
        <aside class="sidebar">
            <a href="index.html" class="sidebar-brand">
                <div class="sidebar-brand-icon">🛡️</div>
                Police Inspectorate
            </a>
            <div class="sidebar-user">
                <div class="sidebar-user-name" id="navUsername">-</div>
                <div class="sidebar-user-role" id="navRole">-</div>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html" class="sidebar-link">
                    <span class="nav-icon">🏠</span> Dashboard
                </a>
                <a href="stations.html" class="sidebar-link active">
                    <span class="nav-icon">🏢</span> Stations
                </a>
                <a href="agents.html" class="sidebar-link">
                    <span class="nav-icon">👮</span> Personnel
                </a>
                <a href="files.html" class="sidebar-link">
                    <span class="nav-icon">📁</span> Case Files
                </a>
                <a href="conferences.html" class="sidebar-link">
                    <span class="nav-icon">📞</span> Communications
                </a>
                <a href="transfers.html" class="sidebar-link">
                    <span class="nav-icon">🔄</span> Transfers
                </a>
            </nav>
            <div class="sidebar-footer">
                <button class="btn-logout" onclick="logout()">⬅ Logout</button>
            </div>
        </aside>

        <div class="main-content">
            <div class="page-header">
                <h1>🏢 Police Stations</h1>
                <p>Manage stations and personnel assignment</p>
            </div>

            <div id="alertBox"></div>

            <div class="stations-layout">
                <div class="stations-list">
                    <div class="list-header">
                        <h3>All Stations</h3>
                        <button class="btn-add" onclick="openAddModal()" id="addBtn" style="display:none;">➕ Add</button>
                    </div>
                    <div class="stations-items" id="stationsList"></div>
                </div>

                <div class="station-layout" id="layoutContainer">
                    <div class="layout-title">Select a station to view layout</div>
                </div>

                <div class="right-panel">
                    <div class="panel-card" id="stationInfo" style="display:none;">
                        <div class="panel-title">📍 STATION INFORMATION</div>
                        <div class="station-info" id="stationInfoContent"></div>
                    </div>
                    <div class="panel-card" id="hierarchyCard" style="display:none;">
                        <div class="panel-title">👑 CHAIN OF COMMAND</div>
                        <div class="hierarchy" id="hierarchyContent"></div>
                    </div>
                    <div class="panel-card" id="mapCard" style="display:none;">
                        <div class="panel-title">🗺️ LOCATION</div>
                        <div class="map-container-small" id="mapContainer"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Add/Edit Station -->
    <div class="modal-overlay" id="stationModal">
        <div class="modal-card">
            <div class="modal-title" id="modalTitle">➕ Add New Station</div>

            <div class="form-group">
                <label class="form-label">Station Name *</label>
                <input type="text" class="form-control" id="stationName" placeholder="e.g. Sectia 1 Craiova">
            </div>

            <div class="form-group">
                <label class="form-label">Address</label>
                <input type="text" class="form-control" id="stationAddress" placeholder="Street address">
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                <div class="form-group">
                    <label class="form-label">Latitude *</label>
                    <input type="number" step="any" class="form-control" id="stationLatitude" placeholder="44.3302">
                </div>
                <div class="form-group">
                    <label class="form-label">Longitude *</label>
                    <input type="number" step="any" class="form-control" id="stationLongitude" placeholder="23.7949">
                </div>
            </div>

            <div id="modalError" class="alert alert-danger" style="display:none;"></div>

            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveStation()">💾 Save</button>
            </div>
        </div>
    </div>

    <script src="javascript/config.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        requireAuth();

        const username = localStorage.getItem("username") || "-";
        const role = localStorage.getItem("role") || "-";
        document.getElementById("navUsername").textContent = username;
        document.getElementById("navRole").textContent = role;

        if (hasRole(["Admin", "ChiefInspector"])) {
            document.getElementById("addBtn").style.display = "flex";
        }

        let allAgents = [];
        let map = null;
        let editingId = null;

        loadStations();

        async function loadStations() {
            try {
                const [stationsRes, agentsRes] = await Promise.all([
                    apiFetch(`${API_BASE_URL}/PoliceStation`),
                    apiFetch(`${API_BASE_URL}/Agent`)
                ]);

                if (agentsRes) allAgents = await agentsRes.json();
                if (!stationsRes) return;

                const stations = await stationsRes.json();
                const list = document.getElementById("stationsList");
                list.innerHTML = "";

                stations.forEach((station, idx) => {
                    const agents = allAgents.filter(a => a.policeStationId === station.id);
                    const div = document.createElement("div");
                    div.className = "station-item";
                    if (idx === 0) div.classList.add("active");
                    div.innerHTML = `
                            <div class="station-name">${station.name}</div>
                            <span class="station-count">${agents.length}</span>
                        `;
                    div.onclick = () => {
                        document.querySelectorAll(".station-item").forEach(i => i.classList.remove("active"));
                        div.classList.add("active");
                        selectStation(station);
                    };
                    list.appendChild(div);
                });

                if (stations.length > 0) selectStation(stations[0]);
            } catch (err) {
                showAlert("Failed to load stations", "danger");
            }
        }

        function selectStation(station) {
            renderStationLayout(station);

            document.getElementById("stationInfo").style.display = "block";
            document.getElementById("hierarchyCard").style.display = "block";
            document.getElementById("mapCard").style.display = "block";

            const agents = allAgents.filter(a => a.policeStationId === station.id);

            document.getElementById("stationInfoContent").innerHTML = `
                    <div class="info-row">
                        <span class="info-label">Name</span>
                        <span class="info-value">${station.name}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Address</span>
                        <span class="info-value">${station.address || "N/A"}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Personnel</span>
                        <span class="info-value">${agents.length}</span>
                    </div>
                `;

            const commander = agents.find(a => a.role === "StationHead") ||
                agents.find(a => a.role === "ChiefInspector");
            document.getElementById("hierarchyContent").innerHTML = `
                    ${commander ? `
                        <div class="hierarchy-item">
                            <div class="hierarchy-level">Commander</div>
                            <div class="hierarchy-name">${commander.firstName} ${commander.lastName}</div>
                        </div>
                    ` : ""}
                    <div class="hierarchy-item">
                        <div class="hierarchy-level">Personnel</div>
                        <div class="hierarchy-name">${agents.length} Total</div>
                    </div>
                `;

            setTimeout(() => {
                if (map) map.remove();
                map = L.map("mapContainer").setView([station.latitude, station.longitude], 15);
                L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);
                L.marker([station.latitude, station.longitude]).addTo(map).bindPopup(station.name).openPopup();
            }, 100);
        }

        /**
         * REQ-17, REQ-19: Render station building layout using roomAssignment field.
         */
        function renderStationLayout(station) {
            const agents = allAgents.filter(a => a.policeStationId === station.id);

            const rooms = [
                {
                    name: "Investigation Wing",
                    type: "investigation",
                    icon: "🔍",
                    agents: agents.filter(a => a.roomAssignment === "Investigation Wing")
                },
                {
                    name: "Patrol Office",
                    type: "patrol",
                    icon: "👮",
                    agents: agents.filter(a => a.roomAssignment === "Patrol Office")
                },
                {
                    name: "Records",
                    type: "records",
                    icon: "📋",
                    agents: agents.filter(a => a.roomAssignment === "Records")
                },
                {
                    name: "Command",
                    type: "command",
                    icon: "👑",
                    agents: agents.filter(a => a.roomAssignment === "Command")
                }
            ];

            const html = `
                    <div class="building">
                        ${rooms.map(room => `
                            <div class="room ${room.type}">
                                <div class="room-title">${room.icon} ${room.name}</div>
                                <div class="room-agents">
                                    ${room.agents.length > 0
                    ? room.agents.map(a => `
                                            <div class="agent-card">
                                         <div class="agent-avatar">
                                     ${a.profileImageUrl
                            ? `<img src="${a.profileImageUrl}" alt="${a.firstName}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`
                            : `${a.firstName[0]}${a.lastName?.[0] || ""}`
    }
                                                 </div>
                                                <div class="agent-info">
                                                    <div class="agent-name">${a.firstName} ${a.lastName}</div>
                                                    <div class="agent-role">${a.role}</div>
                                                </div>
                                            </div>
                                        `).join("")
                    : `<div style="color:var(--text-muted);font-size:11px;">No personnel assigned</div>`
                }
                                </div>
                            </div>
                        `).join("")}
                    </div>
                `;

            document.getElementById("layoutContainer").innerHTML = html;
        }

        function openAddModal() {
            editingId = null;
            document.getElementById("modalTitle").textContent = "➕ Add New Station";
            document.getElementById("stationName").value = "";
            document.getElementById("stationAddress").value = "";
            document.getElementById("stationLatitude").value = "";
            document.getElementById("stationLongitude").value = "";
            document.getElementById("modalError").style.display = "none";
            document.getElementById("stationModal").classList.add("open");
        }

        function closeModal() {
            document.getElementById("stationModal").classList.remove("open");
        }

        async function saveStation() {
            const name = document.getElementById("stationName").value.trim();
            const address = document.getElementById("stationAddress").value.trim();
            const lat = parseFloat(document.getElementById("stationLatitude").value);
            const lng = parseFloat(document.getElementById("stationLongitude").value);

            if (!name || isNaN(lat) || isNaN(lng)) {
                document.getElementById("modalError").textContent = "Name, latitude and longitude are required.";
                document.getElementById("modalError").style.display = "block";
                return;
            }

            const body = JSON.stringify({ name, address, latitude: lat, longitude: lng });

            try {
                const response = editingId
                    ? await apiFetch(`${API_BASE_URL}/PoliceStation/${editingId}`, { method: "PUT", body })
                    : await apiFetch(`${API_BASE_URL}/PoliceStation`, { method: "POST", body });

                if (!response) return;

                if (response.ok) {
                    closeModal();
                    loadStations();
                    showAlert(editingId ? "Station updated." : "Station created.", "success");
                } else {
                    const err = await response.text();
                    document.getElementById("modalError").textContent = err || "Failed to save station.";
                    document.getElementById("modalError").style.display = "block";
                }
            } catch (err) {
                document.getElementById("modalError").textContent = "Connection error.";
                document.getElementById("modalError").style.display = "block";
            }
        }

        function showAlert(msg, type) {
            const box = document.getElementById("alertBox");
            box.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
            setTimeout(() => box.innerHTML = "", 4000);
        }

        function logout() {
            localStorage.clear();
            window.location.href = "login.html";
        }

        document.getElementById("stationModal").addEventListener("click", e => {
            if (e.target.id === "stationModal") closeModal();
        });
    </script>

</body>
</html>
