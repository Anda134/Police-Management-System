<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- REQ-1, REQ-2, REQ-3, REQ-4, REQ-6, REQ-7, REQ-8 -->
    <title>Stations - Police Inspectorate</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>

    <!-- REQ-73, REQ-75: Navbar with user info and logout -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="index.html">🚔 Police Inspectorate</a>
            <div class="navbar-nav me-auto">
                <a class="nav-link active" href="stations.html">Stations</a>
                <a class="nav-link" href="agents.html">Agents</a>
                <a class="nav-link" href="files.html">Criminal Files</a>
                <a class="nav-link" href="conferences.html">Conferences</a>
                <a class="nav-link" href="transfers.html">Transfers</a>
            </div>
            <div class="navbar-nav ms-auto">
                <span class="navbar-text text-light me-3">
                    👤 <span id="navUsername"></span>
                    <span id="navRole" class="badge bg-secondary ms-1"></span>
                </span>
                <button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <h1 class="page-title">Police Stations</h1>

        <!-- Alert box for success/error messages -->
        <div id="alertBox"></div>

        <!-- REQ-1: Create new station form -->
        <div class="card p-4 mb-4 form-section">
            <h4>Add New Station</h4>
            <div class="row g-3">

                <!-- REQ-8: Store name -->
                <div class="col-md-3">
                    <label class="form-label fw-semibold">Name *</label>
                    <input type="text" class="form-control" id="stationName" placeholder="Station name">
                </div>

                <!-- REQ-8: Store address -->
                <div class="col-md-3">
                    <label class="form-label fw-semibold">Address</label>
                    <input type="text" class="form-control" id="stationAddress" placeholder="Street address">
                </div>

                <!-- REQ-4, REQ-7: Geographical coordinates - required before saving -->
                <div class="col-md-2">
                    <label class="form-label fw-semibold">Latitude *</label>
                    <input type="number" step="any" class="form-control" id="stationLatitude" placeholder="e.g. 44.3302">
                </div>

                <div class="col-md-2">
                    <label class="form-label fw-semibold">Longitude *</label>
                    <input type="number" step="any" class="form-control" id="stationLongitude" placeholder="e.g. 23.7949">
                </div>

            </div>

            <div class="mt-3">
                <button class="btn btn-success" onclick="createStation()">➕ Add Station</button>
                <button class="btn btn-secondary ms-2" onclick="clearForm()">Clear</button>
            </div>
        </div>

        <!-- REQ-9: Display all stations -->
        <div class="card p-4">
            <h4>Stations List</h4>
            <div class="table-responsive">
                <table class="table table-bordered table-striped table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Address</th>
                            <!-- REQ-4: Show geographical coordinates -->
                            <th>Latitude</th>
                            <th>Longitude</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="stationsTableBody"></tbody>
                </table>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="javascript/config.js"></script>
    <script src="javascript/stations.js"></script>

</body>
</html>
