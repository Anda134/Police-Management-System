<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Police Stations</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="index.html">Police Inspectorate</a>
        <div class="navbar-nav">
            <a class="nav-link active" href="stations.html">Stations</a>
            <a class="nav-link" href="agents.html">Agents</a>
            <a class="nav-link" href="files.html">Criminal Files</a>
            <a class="nav-link" href="conferences.html">Conferences</a>
            <a class="nav-link" href="transfers.html">Transfers</a>
        </div>
    </div>
</nav>

<div class="container">
    <h1 class="page-title">Police Stations</h1>

    <div class="card p-4 form-section">
        <h4>Add Police Station</h4>
        <div class="row g-3">
            <div class="col-md-3">
                <input type="text" id="stationName" class="form-control" placeholder="Name">
            </div>
            <div class="col-md-3">
                <input type="text" id="stationAddress" class="form-control" placeholder="Address">
            </div>
            <div class="col-md-2">
                <input type="number" step="any" id="stationLatitude" class="form-control" placeholder="Latitude">
            </div>
            <div class="col-md-2">
                <input type="number" step="any" id="stationLongitude" class="form-control" placeholder="Longitude">
            </div>
            <div class="col-md-2">
                <button class="btn btn-success w-100" onclick="createStation()">Create</button>
            </div>
        </div>
    </div>

    <div class="card p-4 table-container">
        <h4>Stations List</h4>
        <table class="table table-bordered table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Address</th>
                    <th>Latitude</th>
                    <th>Longitude</th>
                </tr>
            </thead>
            <tbody id="stationsTableBody"></tbody>
        </table>
    </div>
</div>

<script src="js/config.js"></script>
<script src="js/stations.js"></script>
</body>
</html>
