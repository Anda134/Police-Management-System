<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- REQ-73: Users must authenticate before accessing the system -->
    <title>Login - Police Inspectorate</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body class="bg-dark d-flex align-items-center justify-content-center" style="min-height:100vh;">

    <!-- REQ-73: Login form for user authentication -->
    <div class="card p-4 shadow" style="width:100%;max-width:400px;">

        <div class="text-center mb-4">
            <h3 class="fw-bold">🚔 Police Inspectorate</h3>
            <p class="text-muted">Sign in to your account</p>
        </div>

        <!-- Error alert - hidden by default -->
        <div id="errorAlert" class="alert alert-danger d-none" role="alert"></div>

        <div class="mb-3">
            <label for="username" class="form-label fw-semibold">Username</label>
            <input type="text" class="form-control" id="username" placeholder="Enter username" autocomplete="username">
        </div>

        <div class="mb-3">
            <label for="password" class="form-label fw-semibold">Password</label>
            <input type="password" class="form-control" id="password" placeholder="Enter password" autocomplete="current-password">
        </div>

        <button class="btn btn-primary w-100 fw-semibold" onclick="login()">
            Login
        </button>

    </div>

    <script>
        /**
         * Base URL for all API requests.
         * Update port if your backend runs on a different port.
         */
        const API_BASE_URL = "https://localhost:7001/api";

        /**
         * REQ-73: Redirect to dashboard if user is already authenticated.
         * Checks for existing JWT token in localStorage.
         */
        if (localStorage.getItem("token")) {
            window.location.href = "index.html";
        }

        /**
         * REQ-73: Authenticates the user by sending credentials to the API.
         * On success, stores the JWT token and redirects to the dashboard.
         * REQ-79: Login attempt is recorded server-side in the audit log.
         */
        async function login() {
            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value;
            const errorAlert = document.getElementById("errorAlert");

            // Validate inputs before sending request
            if (!username || !password) {
                showError("Please enter username and password.");
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/Auth/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password })
                });

                if (!response.ok) {
                    showError("Invalid username or password.");
                    return;
                }

                const data = await response.json();

                // REQ-73: Store JWT token and user info for subsequent requests
                localStorage.setItem("token", data.token);
                localStorage.setItem("username", data.username);
                localStorage.setItem("role", data.role);

                // Redirect to dashboard after successful login
                window.location.href = "index.html";

            } catch (err) {
                showError("Could not connect to server. Please try again.");
            }
        }

        /**
         * Displays an error message in the alert box.
         * @param {string} message - The error message to display.
         */
        function showError(message) {
            const errorAlert = document.getElementById("errorAlert");
            errorAlert.textContent = message;
            errorAlert.classList.remove("d-none");
        }

        /**
         * Allows the user to submit the login form by pressing Enter.
         */
        document.addEventListener("keydown", function(event) {
            if (event.key === "Enter") {
                login();
            }
        });
    </script>

</body>
</html>
