<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- REQ-73: Users must authenticate before accessing the system -->
    <title>Login - Police Inspectorate</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="login-page">

    <!-- REQ-73: Login form for user authentication -->
    <div class="login-card">

        <div class="login-title">🛡️ Police Inspectorate</div>
        <div class="login-subtitle">Sign in to your account</div>

        <!-- Error alert - hidden by default -->
        <div id="errorAlert" class="alert alert-danger" style="display:none;"></div>

        <div class="form-group">
            <label class="form-label">Username</label>
            <input type="text" class="form-control" id="username"
                   placeholder="Enter username" autocomplete="username">
        </div>

        <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" id="password"
                   placeholder="Enter password" autocomplete="current-password">
        </div>

        <button class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;" onclick="login()">
            Login
        </button>

    </div>

    <script>
        /**
         * Base URL for all API requests.
         */
        const API_BASE_URL = "http://localhost:5000/api";

        /**
         * REQ-73: Redirect to dashboard if already authenticated.
         */
        if (localStorage.getItem("token")) {
            window.location.href = "index.html";
        }

        /**
         * REQ-73: Authenticates the user and stores JWT token.
         * REQ-79: Login attempt recorded server-side in audit log.
         */
        async function login() {
            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value;

            if (!username || !password) {
                showError("Please enter username and password.");
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/Auth/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password })
                });

                if (!response.ok) {
                    showError("Invalid username or password.");
                    return;
                }

                const data = await response.json();
                localStorage.setItem("token", data.token);
                localStorage.setItem("username", data.username);
                localStorage.setItem("role", data.role);
                window.location.href = "index.html";

            } catch (err) {
                showError("Could not connect to server. Please try again.");
            }
        }

        /**
         * Displays an error message in the alert box.
         * @param {string} message - The error message to display.
         */
        function showError(message) {
            const alert = document.getElementById("errorAlert");
            alert.textContent = message;
            alert.style.display = "block";
        }

        /**
         * Allows login form submission by pressing Enter.
         */
        document.addEventListener("keydown", function (e) {
            if (e.key === "Enter") login();
        });
    </script>

</body>
</html>
